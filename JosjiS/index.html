<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKTA | Neural Vault v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffc107;
            --black: #000000;
            /* FRAGMENT 1: Disembunyikan di CSS Variable */
            --secret-part-2: "ct_master_";
        }

        body {
            background-color: var(--black);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .vault-card {
            background: #0a0a0a;
            padding: 50px;
            border-radius: 30px;
            border: 1px solid #222;
            text-align: center;
            width: 400px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo { font-weight: 800; font-size: 24px; letter-spacing: 5px; margin-bottom: 10px; }
        .logo span { color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        
        .status-light {
            width: 12px; height: 12px; border-radius: 50%;
            background: #ff4d4d; margin: 20px auto;
            box-shadow: 0 0 10px #ff4d4d;
            transition: 0.3s;
        }

        .monitor {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .btn-auth {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* State jika bypass berhasil */
        [data-status="bypass"] .status-light {
            background: #00ff88;
            box-shadow: 0 0 15px #00ff88;
        }
        [data-status="bypass"] .vault-card {
            border-color: var(--gold);
            transform: scale(1.05);
        }

        .flag-display {
            margin-top: 20px;
            font-weight: bold;
            color: var(--gold);
            display: none; /* Hanya muncul lewat JS */
        }
    </style>
</head>
<body>

    <div class="vault-card" id="system-core" data-status="locked" data-prefix="flag{inspe">
        
        <div class="logo">HACKTA <span>VAULT</span></div>
        <p style="font-size: 10px; color: #555; margin-bottom: 30px;">INTERNAL SECURITY TERMINAL</p>

        <div class="status-light"></div>

        <div class="monitor">
            <div id="output">System: LOCKED<br>Integrity: 100%<br>Auth: GUEST</div>
        </div>

        <button class="btn-auth" onclick="checkAccess()">Verify Identity</button>

        <div id="flag-zone" class="flag-display"></div>
    </div>

    <script>
        function checkAccess() {
            const core = document.getElementById('system-core');
            const output = document.getElementById('output');
            
            if (core.getAttribute('data-status') === 'bypass') {
                const p1 = core.getAttribute('data-prefix');
                const p2 = getComputedStyle(document.documentElement).getPropertyValue('--secret-part-2').replace(/"/g, '').trim();
                const p3 = "hackta}";

                document.getElementById('flag-zone').style.display = 'block';
                document.getElementById('flag-zone').innerText = p1 + p2 + p3;
                output.innerHTML = "System: <span style='color:#00ff88'>UNLOCKED</span><br>Auth: ADMINISTRATOR<br>Access: GRANTED";
            } else {
                output.innerHTML = "System: <span style='color:#ff4d4d'>DENIED</span><br>Error: Identity Mismatch<br>Hint: Modify System Core State";
            }
        }

        // Monitoring perubahan atribut (Next Level: Peserta tidak perlu klik tombol lagi, flag langsung rakit)
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === "attributes" && mutation.attributeName === "data-status") {
                    checkAccess();
                }
            });
        });
        observer.observe(document.getElementById('system-core'), { attributes: true });
    </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>HACKTA Login</title>
<style>
body { background:#000; color:#fff; text-align:center; font-family:Arial; }
.card { margin-top:100px; }
button { padding:10px 20px; background:#ffc107; border:none; }
</style>
</head>
<body>

<div class="card">
    <h1>HACKTA Login</h1>
    <p>Login as demo user</p>
    <button onclick="login()">Login</button>
</div>

<script>
function login(){
    const token = {
        username: "student",
        role: "user"
    }

    localStorage.setItem("authToken", btoa(JSON.stringify(token)));
    window.location = "dashboard.html";
}
</script>

</body>
</html>

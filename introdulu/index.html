<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKTA ACADEMY | Terminal Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffc107;
            --black: #000000;
            --dark-grey: #0a0a0a;
            --glow: rgba(255, 193, 7, 0.4);
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        /* Fade In Animation */
        .fade-in {
            animation: fadeIn ease 1.2s;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Container Card */
        .system-card {
            background: var(--dark-grey);
            width: 90%;
            max-width: 500px;
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 193, 7, 0.2);
            text-align: center;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,1), 0 0 20px var(--glow);
        }

        /* Branding */
        .logo {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .logo span {
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }

        .tagline {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* Interactive Scanner Area */
        .scanner-zone {
            border: 2px dashed #333;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            position: relative;
            transition: all 0.3s ease;
        }

        .scanner-icon {
            font-size: 50px;
            color: var(--gold);
            margin-bottom: 15px;
            display: block;
            filter: drop-shadow(0 0 5px var(--gold));
        }

        /* Pulsing Animation */
        .pulse {
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Scan Button */
        .action-btn {
            background: none;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 25px var(--gold);
        }

        /* Status Output */
        #status-display {
            margin-top: 25px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .denied {
            color: #ff4d4d;
            font-weight: bold;
        }

        /* THE CHALLENGE: Hidden Panel */
        #hidden-admin-console {
            display: block;
            margin-top: 40px;
            padding: 20px;
            border: 1px solid var(--gold);
            background: rgba(255, 193, 7, 0.05);
            border-radius: 10px;
	            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .flag-box {
            color: var(--gold);
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 1.1rem;
            border-left: 4px solid var(--gold);
        }

        .hint {
            color: #444;
            font-size: 0.7rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="system-card fade-in">
        <div class="logo">HACKTA <span>ACADEMY</span></div>
        <div class="tagline">Neural Link Internal Portal</div>

        <div class="scanner-zone">
            <span class="scanner-icon pulse">⚝</span>
            <p style="font-size: 0.9rem; color: #ccc;">Sistem mendeteksi identitas tamu.</p>
            
            <button class="action-btn" onclick="runDiagnostic()">Run Identity Scan</button>
            
            <div id="status-display">Ready for System Validation...</div>
        </div>

        <div id="hidden-admin-console">
            <h4 style="color: var(--gold); margin: 0;">ADMIN OVERRIDE DETECTED</h4>
            <p style="font-size: 0.8rem; color: #aaa;">Privileged information decrypted below:</p>
            <div class="flag-box">
                flag{4dm1n_1n5p3ct0r_839198138}
            </div>
        </div>

        <div class="hint">HACKTA_SEC_CORE v2.0.4 - Unauthorized Access is Logged</div>
    </div>

    <script>
        function runDiagnostic() {
            const status = document.getElementById('status-display');
            status.innerHTML = "Scanning... <span style='color: var(--gold)'>[||||||||||]</span>";
            
            setTimeout(() => {
                status.innerHTML = "<span class='denied'>ERROR: ACCESS_LEVEL_INSUFFICIENT</span><br><small>Level 5 Clearance Required.</small>";
            }, 1500);
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HACKTA ACADEMY | Portal Rahasia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .kartu-portal {
            background: #0d0d0d;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ffc107;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.2);
            max-width: 400px;
        }

        h1 { color: #ffc107; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; }

        .status-badge {
            background: #333;
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
            margin: 20px 0;
        }

        /* --- BAGIAN LOGIKA (DIBACA OLEH BROWSER) --- */
        
        /* Kalau statusnya 'tamu', sembunyikan flag */
        [data-akses="tamu"] .konten-admin { display: none; }
        [data-akses="tamu"] .status-badge { color: #ff4d4d; }
        [data-akses="tamu"] .status-badge::after { content: "AKSES: DITOLAK"; }

        /* Kalau statusnya 'admin', munculkan flag secara ajaib! */
        [data-akses="admin"] .konten-admin { display: block; border: 1px dashed #ffc107; padding: 15px; margin-top: 20px; }
        [data-akses="admin"] .status-badge { color: #00ff88; background: #111; box-shadow: 0 0 10px #00ff88; }
        [data-akses="admin"] .status-badge::after { content: "AKSES: ADMIN"; }
        [data-akses="admin"] .pesan-error { display: none; }
    </style>
</head>

<body data-akses="tamu">

    <div class="kartu-portal">
        <h1>HACKTA <span>ACADEMY</span></h1>
        <p>Internal Access Portal</p>

        <div class="status-badge"></div>

        <div class="pesan-error">
            <p style="color: white;">Maaf, level akun kamu terlalu rendah untuk melihat Flag.</p>
        </div>

        <div class="konten-admin">
            <p style="color: #ffc107; font-weight: bold;">[ SELAMAT! AKSES DITERIMA ]</p>
            <p>Ini adalah kode rahasia kamu:</p>
            <div style="background: #1a1a1a; padding: 10px; font-family: monospace; color: #ffc107;">
                flag{inspect_master_hackta}
            </div>
        </div>

        <p style="font-size: 10px; margin-top: 30px; opacity: 0.3;">Sistem Keamanan HACKTA v1.0</p>
    </div>

</body>
</html>

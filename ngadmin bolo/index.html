<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HACKTA Secure Authority</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #000000, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #111;
    padding: 40px;
    width: 420px;
    border-radius: 15px;
    text-align: center;
    border: 2px solid #ffc107;
    box-shadow: 0 0 30px rgba(255,193,7,0.5);
}

.logo {
    font-size: 28px;
    font-weight: bold;
}

.logo span {
    color: #ffc107;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #ffc107;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #ff9800;
}

.panel {
    margin-top: 20px;
    padding: 15px;
    background: #222;
    border-radius: 10px;
    display: none;
}
</style>
</head>
<body>

<div class="card">
    <div class="logo">HACKTA <span>ACADEMY</span></div>
    <p>Authority Verification System</p>

    <p id="status">Current Role: guest</p>

    <button onclick="upgrade()">Request Upgrade</button>
    <button onclick="enter()">Enter Admin Panel</button>

    <div id="adminPanel" class="panel">
        <h3>Admin Panel</h3>
        <p id="flagArea"></p>
    </div>
</div>

<script>
let role = "user";
let internalAuth = false;

function upgrade() {
    alert("Upgrade request sent. Awaiting approval...");
}

function enter() {
    if (role === "admin" && internalAuth === true) {
        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("flagArea").innerText =
            atob("ZmxhZ3tyb2xlX2VzY2FsYXRpb25fbWFzdGVyfQ==");
    } else {
        alert("Access Denied");
    }
}
</script>

</body>

</html>
